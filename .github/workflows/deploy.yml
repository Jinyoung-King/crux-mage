name: Deploy Web to GitHub Pages

# main에 푸시(또는 수동 실행)하면 Godot로 웹 빌드 후 gh-pages 브랜치에 publish.
# Pages가 이미 'gh-pages 브랜치'를 서빙하도록 설정돼 있어(legacy) 설정 변경 불필요 —
# 그동안 수동으로 하던 gh-pages 배포를 자동화한 것.

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write   # gh-pages 브랜치 푸시용

concurrency:
  group: deploy-pages
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.3"   # 로컬과 동일(4.6.3.stable). 엔진 올리면 이 값만 바꿀 것

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Godot + 웹 export 템플릿 설치
        run: |
          set -e
          GV="${GODOT_VERSION}"
          BASE="https://github.com/godotengine/godot/releases/download/${GV}-stable"
          curl -fL -o godot.zip "${BASE}/Godot_v${GV}-stable_linux.x86_64.zip"
          curl -fL -o templates.tpz "${BASE}/Godot_v${GV}-stable_export_templates.tpz"
          unzip -q godot.zip
          mv "Godot_v${GV}-stable_linux.x86_64" godot
          chmod +x godot
          mkdir -p "$HOME/.local/share/godot/export_templates/${GV}.stable"
          unzip -q templates.tpz
          mv templates/* "$HOME/.local/share/godot/export_templates/${GV}.stable/"

      - name: 웹 빌드 (Web 프리셋)
        run: |
          set -e
          mkdir -p build/web
          # 신규 체크아웃이라 .godot 없음 — 임포트 2회로 안정화
          ./godot --headless --import --path . || true
          ./godot --headless --import --path . || true
          ./godot --headless --export-release "Web" build/web/index.html --path .
          test -f build/web/index.wasm && echo "빌드 OK: $(ls -la build/web/index.wasm)"

      - name: gh-pages 브랜치에 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          # Pages가 Jekyll로 가공하지 않도록(_ 시작 파일 보존). peaceiris가 .nojekyll 자동 생성.
          enable_jekyll: false
