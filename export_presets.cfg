html/head_include="<meta name=\"apple-mobile-web-app-capable\" content=\"yes\"><meta name=\"mobile-web-app-capable\" content=\"yes\"><meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black-translucent\"><script>if('serviceWorker' in navigator){function cmBanner(w){if(document.getElementById('cm-upd'))return;var wrap=document.createElement('div');wrap.id='cm-upd';wrap.style.cssText='position:fixed;left:50%;top:18px;transform:translateX(-50%);z-index:99999;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 24px;border-radius:16px;background:linear-gradient(135deg,#5b8cff,#8a5cff);color:#fff;font-family:sans-serif;box-shadow:0 8px 26px rgba(70,80,200,.55);cursor:pointer;min-width:min(460px,90vw);max-width:94vw';var ic=document.createElement('div');ic.textContent='✨';ic.style.cssText='font-size:24px';var col=document.createElement('div');var t1=document.createElement('div');t1.textContent='새 버전이 준비됐어요';t1.style.cssText='font-weight:700;font-size:15px';var t2=document.createElement('div');t2.textContent='탭해서 최신으로 업데이트';t2.style.cssText='font-size:12px;opacity:.85;margin-top:2px';col.appendChild(t1);col.appendChild(t2);var btn=document.createElement('div');btn.textContent='업데이트';btn.style.cssText='margin-left:4px;padding:8px 14px;border-radius:10px;background:rgba(255,255,255,.22);font-weight:700;font-size:13px;white-space:nowrap';wrap.appendChild(ic);wrap.appendChild(col);wrap.appendChild(btn);wrap.onclick=function(){btn.textContent='업데이트 중…';if(w){w.postMessage('update');}else{location.reload();}};document.body.appendChild(wrap);wrap.animate([{opacity:0,transform:'translateX(-50%) translateY(-26px)'},{opacity:1,transform:'translateX(-50%) translateY(0)'}],{duration:400,easing:'cubic-bezier(.2,.9,.3,1.25)'});ic.animate([{transform:'scale(1)'},{transform:'scale(1.25)'},{transform:'scale(1)'}],{duration:1600,iterations:Infinity});}window.addEventListener('load',function(){navigator.serviceWorker.register('index.service.worker.js').then(function(r){if(r.waiting&&navigator.serviceWorker.controller){cmBanner(r.waiting);}r.addEventListener('updatefound',function(){var n=r.installing;if(!n)return;n.addEventListener('statechange',function(){if(n.state==='installed'&&navigator.serviceWorker.controller){cmBanner(n);}});});}).catch(function(){});});}</script>"
